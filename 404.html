<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — Page Not Found · Oz Indie Collective</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
.not-found{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
.nf-inner{max-width:520px}
.nf-code{font-family:var(--font-mono);font-size:6rem;font-weight:700;color:rgba(245,166,35,.15);line-height:1;margin-bottom:-.5rem}
.nf-title{font-family:var(--font-display);font-size:2.5rem;font-weight:700;color:var(--cream);margin-bottom:.75rem;line-height:1.1}
.nf-sub{color:var(--muted);line-height:1.7;margin-bottom:2rem}
.nf-links{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
</style>
<link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
</head>
<body>
<div id="nav-placeholder"></div>
<div class="not-found">
  <div class="nf-inner">
    <div class="nf-code">404</div>
    <h1 class="nf-title">This page has <em>left the stage.</em></h1>
    <p class="nf-sub">The page you're looking for doesn't exist, has moved, or has been removed. Let's get you back to where the action is.</p>
    <div class="nf-links">
      <a href="index.html" class="btn-primary btn-lg">← Back Home</a>
      <a href="pages/directory.html" class="btn-secondary btn-lg">Browse Directory</a>
      <a href="pages/opportunities.html" class="btn-ghost btn-lg">View Jobs</a>
    </div>
  </div>
</div>
<script src="assets/js/nav-inject.js"></script>
<script src="assets/js/main.js"></script>
</body>
</html>
